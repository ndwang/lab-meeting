# Render blueprint: one web service that serves the API + built client,
# plus a managed Postgres instance. Push to GitHub, then "New > Blueprint".
services:
  - type: web
    name: lab-meeting
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: LAB_MEETING_TOKEN
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lab-meeting-db
          property: connectionString

databases:
  - name: lab-meeting-db
    plan: free
